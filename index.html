<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/projCSS.css">
    <script defer src="./projJS.js"></script>
    <title>Wordle</title>
</head>
<body>
    <div class="game-container">
      <h1>Wordle</h1>

      <p class="instructions">
        Guess the five-letter word, you have six attempts.
      </p>

      <p id="message"></p>

      <div id="board">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>

        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>

        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>

        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>

        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>

        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
      </div>


      <button id="reset-button" type="button">Reset Game</button>
      <button id ="replay-button" class ="hide-button" type="button">Replay</button>

       <div class="keyboard">

        <div id="kb-row1" class="kbRow">
            <button type="button" class="kb-buttons">Q</button>
            <button type="button" class="kb-buttons">W</button>
            <button type="button" class="kb-buttons">E</button>
            <button type="button" class="kb-buttons">R</button>
            <button type="button" class="kb-buttons">T</button>
            <button type="button" class="kb-buttons">Y</button>
            <button type="button" class="kb-buttons">U</button>
            <button type="button" class="kb-buttons">I</button>
            <button type="button" class="kb-buttons">O</button>
            <button type="button" class="kb-buttons">P</button>
        </div>

        <div id="kb-row2" class="kbRow">
            <button type="button" class="kb-buttons">A</button>
            <button type="button" class="kb-buttons">S</button>
            <button type="button" class="kb-buttons">D</button>
            <button type="button" class="kb-buttons">F</button>
            <button type="button" class="kb-buttons">G</button>
            <button type="button" class="kb-buttons">H</button>
            <button type="button" class="kb-buttons">J</button>
            <button type="button" class="kb-buttons">K</button>
            <button type="button" class="kb-buttons">L</button>
        </div>

        <div id="kb-row3" class="kbRow">
            <button type="button" class="enter-backspace kb-buttons" >ENTER</button>
            <button type="button" class="kb-buttons">Z</button>
            <button type="button" class="kb-buttons">X</button>
            <button type="button" class="kb-buttons">C</button>
            <button type="button" class="kb-buttons">V</button>
            <button type="button" class="kb-buttons">B</button>
            <button type="button" class="kb-buttons">N</button>
            <button type="button" class="kb-buttons">M</button>
            <button type="button" class="enter-backspace kb-buttons">BACKSPACE</button>
        </div>

      </div>
    </div>

</body>
</html>
